<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Admin — Leonardograf Propiedades</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    body { display: flex; min-height: 100vh; background: var(--color-bg-soft); }
    .admin-sidebar { width: 240px; background: var(--color-accent); color: #fff; padding: var(--spacing-xl) var(--spacing-md); flex-shrink: 0; min-height: 100vh; }
    .admin-sidebar__logo { font-size: var(--font-size-lg); font-weight: 700; margin-bottom: var(--spacing-2xl); display: flex; align-items: center; gap: var(--spacing-sm); }
    .admin-nav { display: flex; flex-direction: column; gap: var(--spacing-xs); }
    .admin-nav__link { display: flex; align-items: center; gap: var(--spacing-sm); padding: 0.65rem var(--spacing-md); border-radius: var(--radius-md); font-size: var(--font-size-sm); color: rgba(255,255,255,0.75); transition: background var(--transition), color var(--transition); cursor: pointer; }
    .admin-nav__link:hover, .admin-nav__link.active { background: rgba(255,255,255,0.15); color: #fff; }
    .admin-main { flex: 1; padding: var(--spacing-xl); }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--spacing-2xl); }
    .admin-header h1 { font-size: var(--font-size-2xl); font-weight: 700; }
    .admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: var(--spacing-lg); margin-bottom: var(--spacing-2xl); }
    .stat-card { background: var(--color-bg); border-radius: var(--radius-lg); box-shadow: var(--shadow-card); padding: var(--spacing-lg); }
    .stat-card__value { font-size: var(--font-size-3xl); font-weight: 700; color: var(--color-accent); }
    .stat-card__label { font-size: var(--font-size-sm); color: var(--color-text-muted); margin-top: var(--spacing-xs); }
    .admin-table-wrap { background: var(--color-bg); border-radius: var(--radius-lg); box-shadow: var(--shadow-card); overflow: hidden; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: var(--font-size-sm); }
    .admin-table th { background: var(--color-bg-soft); padding: var(--spacing-md) var(--spacing-lg); text-align: left; font-weight: 600; color: var(--color-text-muted); border-bottom: 1px solid var(--color-border); }
    .admin-table td { padding: var(--spacing-md) var(--spacing-lg); border-bottom: 1px solid var(--color-border); color: var(--color-text); }
    .admin-table tr:last-child td { border-bottom: none; }
    .admin-table tr:hover td { background: var(--color-bg-soft); }
    .badge { display: inline-block; padding: 0.2rem 0.65rem; border-radius: var(--radius-full); font-size: var(--font-size-xs); font-weight: 600; }
    .badge-venta { background: rgba(27,67,50,0.1); color: var(--color-accent); }
    .badge-alquiler { background: rgba(37,99,235,0.1); color: #2563eb; }
    @media (max-width: 768px) { .admin-sidebar { display: none; } }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <aside class="admin-sidebar">
    <div class="admin-sidebar__logo">
      <svg width="28" height="28" viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="rgba(255,255,255,0.2)"/><path d="M16 6L6 14V26H13V20H19V26H26V14L16 6Z" fill="white"/></svg>
      Admin
    </div>
    <nav class="admin-nav">
      <div class="admin-nav__link active">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Dashboard
      </div>
      <div class="admin-nav__link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Propiedades
      </div>
      <div class="admin-nav__link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        Consultas
      </div>
      <div class="admin-nav__link">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
        Configuración
      </div>
      <div style="margin-top:auto;padding-top:var(--spacing-2xl)">
        <a href="../index.html" class="admin-nav__link">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          Ver sitio
        </a>
      </div>
    </nav>
  </aside>

  <!-- Contenido principal -->
  <main class="admin-main">
    <div class="admin-header">
      <h1>Dashboard</h1>
      <button class="btn btn-primary" onclick="alert('Funcionalidad próximamente')">+ Nueva propiedad</button>
    </div>

    <!-- Stats -->
    <div class="admin-stats">
      <div class="stat-card">
        <div class="stat-card__value" id="statTotal">—</div>
        <div class="stat-card__label">Propiedades activas</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__value" id="statVenta">—</div>
        <div class="stat-card__label">En venta</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__value" id="statAlquiler">—</div>
        <div class="stat-card__label">En alquiler</div>
      </div>
      <div class="stat-card">
        <div class="stat-card__value">0</div>
        <div class="stat-card__label">Consultas nuevas</div>
      </div>
    </div>

    <!-- Tabla -->
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Propiedad</th>
            <th>Operación</th>
            <th>Precio</th>
            <th>Ubicación</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="adminTabla">
          <tr><td colspan="6" style="text-align:center;color:var(--color-text-muted);padding:2rem">Cargando…</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <script src="../js/utils.js"></script>
  <script src="../js/api.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      let props;
      try {
        const res = await getPropiedades();
        props = res.items;
      } catch {
        props = PROPIEDADES_DEMO;
      }

      document.getElementById('statTotal').textContent   = props.length;
      document.getElementById('statVenta').textContent   = props.filter(p => p.operacion === 'venta').length;
      document.getElementById('statAlquiler').textContent = props.filter(p => p.operacion === 'alquiler').length;

      const tbody = document.getElementById('adminTabla');
      tbody.innerHTML = props.map(p => `
        <tr>
          <td>#${p.id}</td>
          <td><strong>${p.titulo}</strong></td>
          <td><span class="badge badge-${p.operacion}">${p.operacion === 'venta' ? 'Venta' : 'Alquiler'}</span></td>
          <td>${formatearPrecio(p.precio, p.moneda || 'USD')}</td>
          <td>${p.ubicacion || '—'}</td>
          <td>
            <a href="../propiedad.html?id=${p.id}" target="_blank" style="color:var(--color-accent);font-weight:500;font-size:0.875rem">Ver</a>
          </td>
        </tr>`).join('');
    });
  </script>
</body>
</html>
